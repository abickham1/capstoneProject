<!DOCTYPE html>
<html>
<head>
    <title>Main Menu</title>
    <style>
        body {
            background-image: url(https://cdn.esahubble.org/archives/images/screen/heic2414a.jpg);
            background-size: cover;
            color: white;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
        }

        .menu-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .menu-box {
            width: 200px;
            height: 150px;
            background-color: rgba(0,0,0,0.6);
            border: 2px solid white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-box:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        a {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

<h1>Main Menu</h1>

<div class="menu-container">
    <div class="menu-box">
        <a href="{{ url_for('examinations') }}">Examinations</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('favorites') }}">Favorites</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('profile') }}">Profile</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('community') }}">Community</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

</body>
</html>
