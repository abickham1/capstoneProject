<!DOCTYPE html>
<html>
<head>
    <title>EXAMINATIONS</title>
    <style>
        body {
            background-color: white;
            color: black;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
        .button {
            border: none;
            color: white;
            padding: 16px 32px;
            font-size: 24px; /* bigger for arrows */
            margin: 4px 2px;
            cursor: pointer;
            transition-duration: 0.4s;
        }
        .button1 {
            background-color: gray; 
            color: orange; 
            border: 2px solid #4CAF50;
        }
        .button1:hover {
            background-color: #4CAF50;
            color: white;
        }
        .class-buttons {
            margin-top: 20px;
        }
        .class-buttons button {
            padding: 12px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 40px;
        }
    </style>
</head>
<body>    
    <h1>EXAMINATIONS</h1>

    <img src="{{ url_for('static', filename=img_path) }}" alt="Galaxy Image" width="500">

    {% if pred_class and pred_conf %}
        <h2>Prediction: {{ pred_class }} ({{ pred_conf | round(2) }}%)</h2>
    {% endif %}

    <div class="class-buttons">
        <h3>Select the galaxy type:</h3>
        <form method="POST" action="/examinations">
            {% for class_name in class_names %}
                <button type="submit" name="classification" value="{{ class_name }}">
                    {{ class_name.capitalize() }}
                </button>
            {% endfor %}
        </form>
    </div>

    <div class="nav-buttons">
        <form method="post" action="/examinations">
            <input type="hidden" name="direction" value="left">
            <button type="submit" class="button button1">←</button>
        </form>

        <form method="post" action="/examinations">
            <input type="hidden" name="direction" value="right">
            <button type="submit" class="button button1">→</button>
        </form>
    </div>
</body>
</html>
