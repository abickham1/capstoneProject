<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>
        body {
            background-image: url(https://cdn.esahubble.org/archives/images/screen/heic2414a.jpg);
            background-size: cover;
            color: white;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
        }

        .menu-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .menu-box {
            width: 220px;
            height: 120px;
            background-color: rgba(0,0,0,0.6);
            border: 2px solid white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-box:hover {
            background-color: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        a {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-buttons {
            margin-top: 20px;
        }

        .nav-buttons button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<h1>Hello, {{ session.get('username') }}!</h1>

<!-- Navigation Buttons -->
<div class="nav-buttons">
    <button onclick="window.history.back()">← Back</button>
    <form action="{{ url_for('main') }}" method="get" style="display:inline;">
        <button type="submit">Main Menu</button>
    </form>
</div>

<!-- Profile Actions -->
<div class="menu-container">
    <div class="menu-box">
        <a href="{{ url_for('edit_username') }}">Edit Username</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('update_password') }}">Update Password</a>
    </div>
    <div class="menu-box">
        <a href="{{ url_for('delete_account') }}">Delete Account</a>
    </div>
    <div class="menu-box" style="background-color: red;">
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

</body>
</html>
